<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }}</title>
<link rel="stylesheet" href="/static/ui.css?v={{ version }}">
</head>
<body>
<header>
  <h1>phototag</h1>
  <label>run <select id="run-select"></select></label>
  <label style="margin-left:auto;">
    score ≥ <input id="min-score" type="number" min="0" max="1" step="0.05" value="0.6" style="width:60px">
  </label>
</header>
<main>
  <aside>
    <div class="section">
      <h3>filters</h3>
      <div class="ts-wrap" style="margin-bottom:6px;">
        <input id="tag-input" type="text" placeholder="add tag…" autocomplete="off" style="width:100%; padding:5px 7px; border:1px solid var(--border); border-radius:4px; font-size:13px;">
        <div id="tag-drop" class="ts-drop"></div>
      </div>
      <div class="filters" id="active-tags"><span class="muted">none</span></div>
      <button id="clear-filters" style="margin-top:6px;">clear</button>
    </div>
    <div class="section">
      <h3>top tags</h3>
      <div class="tags" id="top-tags"></div>
    </div>
    <div class="section">
      <h3>views</h3>
      <button class="view-btn active" id="view-clusters" data-view="clusters">clusters</button>
      <button class="view-btn" id="view-faces" data-view="faces">
        faces <span id="faces-count" style="opacity:0.7;font-size:11px;"></span>
      </button>
    </div>
    <div class="section" style="padding:0;">
      <h3 style="padding:8px 10px 4px;" id="cluster-pane-title">clusters</h3>
      <div id="cluster-list"></div>
    </div>
  </aside>
  <section class="workspace" id="workspace">
    <div class="empty">Pick a cluster on the left, or type a tag to search.</div>
  </section>
</main>
<div class="lightbox" id="lightbox" onclick="if(event.target===this) closeLightbox()">
  <span class="close" onclick="closeLightbox()">×</span>
  <span class="counter" id="lightbox-counter"></span>
  <span class="nav prev" onclick="navLightbox(-1)">‹</span>
  <span class="counter" style="top:42px; left:20px;" id="lightbox-toggle-faces">faces (F)</span>
  <div id="lightbox-stage">
    <img id="lightbox-img" alt="">
    <div id="face-layer" class="face-layer"></div>
  </div>
  <span class="nav next" onclick="navLightbox(1)">›</span>
  <div class="info" id="lightbox-info"></div>
</div>
<div id="face-name-form" class="face-name-form" style="display:none;">
  <div class="row">
    <input id="face-name-input" type="text" placeholder="name this person…" autocomplete="off">
    <button id="face-name-save" title="save (Enter)">save</button>
  </div>
  <div class="row actions">
    <button id="face-view-person" title="view this person's photos (V)" style="display:none;">view <span class="key">V</span></button>
    <button id="face-wrong" title="this face was clustered with the wrong person (W)" style="display:none;">wrong <span class="key">W</span></button>
    <button id="face-delete" title="not a face / delete row (D)">delete <span class="key">D</span></button>
    <span class="spacer"></span>
    <button id="face-name-cancel" title="close (Esc)">close <span class="key">Esc</span></button>
  </div>
</div>
<script src="/static/ui.js?v={{ version }}" defer></script>
</body>
</html>
